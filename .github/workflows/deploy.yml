name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund --prefer-offline || true
          # 验证关键依赖是否已安装
          if [ ! -f "node_modules/vite/package.json" ]; then
            echo "vite 未安装，尝试二次安装..."
            npm install --no-audit --no-fund --prefer-offline || true
          fi
          echo "=== 验证关键依赖 ==="
          ls -la node_modules/vite/package.json
          ls -la node_modules/@vitejs/plugin-react/package.json
          ls -la node_modules/vite-tsconfig-paths/package.json
          echo "=== 依赖总数 ==="
          ls node_modules | wc -l

      - name: Build
        run: |
          echo "构建前：列出 node_modules/.bin/vite"
          ls -la node_modules/.bin/vite
          echo "开始构建..."
          node ./node_modules/vite/bin/vite.js build
          echo "构建完成！dist 目录："
          ls -la dist
          echo "dist 大小："
          du -sh dist

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
