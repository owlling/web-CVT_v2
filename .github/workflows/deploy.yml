name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies (npm exit handler 容错)
        run: |
          set +e
          npm install --no-audit --no-fund
          echo "npm 退出码: $?"
          if [ ! -d "node_modules/vite" ] || [ ! -d "node_modules/@vitejs/plugin-react" ]; then
            echo "关键依赖缺失，重新安装..."
            npm install --no-audit --no-fund
          fi
          echo "验证关键依赖是否存在："
          ls -la node_modules/vite/package.json node_modules/@vitejs/plugin-react/package.json
          echo "依赖安装完成"

      - name: Build
        run: npx vite build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
